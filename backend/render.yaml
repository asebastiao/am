services:
  - type: web
    name: django-backend
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
    startCommand: gunicorn portfolio_am_backend.wsgi
    envVars:
      # IMPORTANTE: nenhum valor de segredo fica neste ficheiro (é versionado no git).
      # "sync: false" faz o Render pedir o valor uma vez no dashboard e guardá-lo
      # de forma cifrada — nunca no repositório.
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: muhanguenaart-backend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://muhanguenaart-backend.onrender.com
      - key: FRONTEND_URL
        value: https://muhanguenaart.vercel.app
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
